<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title | default: site.title }} - Life Stream</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #faf7f2;
      color: #3d3530;
      line-height: 1.85;
      font-size: 15px;
      -webkit-text-size-adjust: 100%;
    }
    .layout { display: flex; max-width: 960px; margin: 0 auto; }
    .sidebar {
      width: 200px;
      background: #f5ebe0;
      padding: 24px 16px;
      max-height: 100vh;
      border-right: 1px solid #e6d5c3;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      align-self: flex-start;
      overflow-y: auto;
    }
    .sidebar h3 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #9c6644;
      margin-bottom: 12px;
    }
    .sidebar a {
      display: block;
      padding: 6px 10px;
      color: #7f5539;
      text-decoration: none;
      font-size: 13px;
      border-radius: 6px;
      margin-bottom: 2px;
    }
    .sidebar a:hover, .sidebar a.active {
      background: #eedcca;
      color: #3d2b1a;
    }
    .sidebar-divider {
      border-top: 1px solid #e6d5c3;
      margin: 12px 0;
    }
    .main {
      flex: 1;
      padding: 40px 32px;
      min-width: 0;
    }
    .doc-content h1 {
      font-size: 1.5rem;
      margin-bottom: 24px;
      color: #5a3e28;
      font-weight: 700;
    }
    .doc-content h2 {
      font-size: 1.1rem;
      margin: 32px 0 12px;
      color: #7f5539;
      font-weight: 700;
      scroll-margin-top: 20px;
    }
    .doc-content h3 {
      font-size: 0.95rem;
      margin: 18px 0 8px;
      color: #9c6644;
    }
    .doc-content p {
      margin-bottom: 14px;
      color: #524740;
    }
    .doc-content ul, .doc-content ol {
      margin: 8px 0 14px 24px;
      color: #524740;
    }
    .doc-content li { margin-bottom: 4px; }
    .doc-content table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      margin: 16px 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(90, 62, 40, 0.06);
    }
    .doc-content th, .doc-content td { padding: 10px 14px; text-align: left; }
    .doc-content th { background: #ddb892; color: #3d2b1a; font-weight: 700; font-size: 0.85rem; }
    .doc-content td { background: #fff; border-bottom: 1px solid #f0e6da; }
    .doc-content tr:last-child td { border-bottom: none; }
    .doc-content code {
      font-family: 'SF Mono', Menlo, Monaco, monospace;
      font-size: 0.85em;
      color: #bc6c25;
      background: #f5ede4;
      padding: 1px 5px;
      border-radius: 4px;
    }
    .doc-content pre {
      background: #3d2b1a;
      color: #f5ebe0;
      padding: 16px;
      border-radius: 10px;
      overflow-x: auto;
      margin: 16px 0;
      font-size: 14px;
    }
    .doc-content pre code { background: none; padding: 0; color: #f5ebe0; }
    .doc-content blockquote {
      border-left: 4px solid #ddb892;
      padding: 12px 16px;
      margin: 16px 0;
      background: #f5efe6;
      border-radius: 0 8px 8px 0;
      color: #5a4a3e;
    }
    .doc-content hr {
      border: none;
      border-top: 1px solid #e6d5c3;
      margin: 28px 0;
    }

    /* 一覧用 */
    .doc-list { list-style: none; }
    .doc-item {
      background: #fdfbf8;
      border-radius: 10px;
      margin-bottom: 8px;
      border: 1px solid #ede2d5;
    }
    .doc-item a {
      display: block;
      padding: 14px 16px;
      color: #7f5539;
      text-decoration: none;
      font-weight: 600;
    }
    .doc-item a:hover { background: #eedcca; border-radius: 10px; }
    .doc-file { display: block; padding: 0 16px 10px; font-size: 12px; color: #b08968; }

    @media (max-width: 768px) {
      .sidebar { display: none; }
      .layout { flex-direction: column; }
      .main { padding: 24px 16px; }
    }
  </style>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <h3>メニュー</h3>
      <a href="{{ site.baseurl }}/"{% if page.url == '/' %} class="active"{% endif %}>仕様書一覧</a>
      {% if page.toc %}
      <div class="sidebar-divider"></div>
      <h3>目次</h3>
      {% for item in page.toc %}
      <a href="#{{ item.id }}">{{ item.title }}</a>
      {% endfor %}
      {% endif %}
    </aside>
    <div class="main">
      <article class="doc-content">
        {{ content }}
      </article>
    </div>
  </div>
  <script>
    // h2 に自動で id を付与してサイドバー目次を生成
    document.addEventListener('DOMContentLoaded', function() {
      var sidebar = document.querySelector('.sidebar');
      var h2s = document.querySelectorAll('.doc-content h2');
      if (h2s.length === 0) return;

      var existing = sidebar.querySelector('.sidebar-divider');
      if (existing) return; // front matter で toc 指定済み

      var divider = document.createElement('div');
      divider.className = 'sidebar-divider';
      sidebar.appendChild(divider);

      var label = document.createElement('h3');
      label.textContent = '目次';
      sidebar.appendChild(label);

      h2s.forEach(function(h2, i) {
        var id = 'sec-' + i;
        h2.id = id;
        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = h2.textContent;
        sidebar.appendChild(a);
      });
    });
  </script>
</body>
</html>
