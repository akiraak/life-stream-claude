<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>買い物リスト</title>
  <link rel="stylesheet" href="style.css?v=__CACHE_VERSION__">
</head>
<body>
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 14px">
      <h1 style="margin:0">買い物リスト</h1>
      <a href="/admin/" style="color:#555;font-size:13px;text-decoration:none">管理画面</a>
    </div>

    <div id="shopping-list"></div>

    <div id="empty-message" class="empty" style="display:none">
      リストは空です
    </div>
  </div>

  <!-- FAB -->
  <div class="fab-group">
    <button class="fab fab-dish" id="fab-dish" title="料理を追加">
      <img src="icon_dish.png" width="40" height="40" alt="料理を追加">
    </button>
    <button class="fab fab-item" id="fab-item" title="アイテムを追加">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal" id="modal">
      <div class="modal-title" id="modal-title"></div>
      <input type="text" class="modal-input" id="modal-input" placeholder="" autocomplete="off">
      <div class="suggestions-dropdown" id="suggestions-dropdown"></div>
      <div class="modal-dish-row" id="modal-dish-row" style="display:none">
        <label class="modal-label">料理</label>
        <select class="modal-select" id="modal-dish-select">
          <option value="">未分類</option>
        </select>
      </div>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="modal-cancel">キャンセル</button>
        <button class="modal-btn modal-ok" id="modal-ok">追加</button>
      </div>
    </div>
  </div>

  <!-- 具材提案モーダル -->
  <div class="modal-overlay" id="ingredients-overlay">
    <div class="modal ingredients-modal">
      <div class="modal-title" id="ingredients-title">具材を検索中...</div>
      <div id="ingredients-loading" class="ingredients-loading">
        <div class="spinner"></div>
      </div>
      <div id="ingredients-error" class="ingredients-error" style="display:none"></div>
      <div id="ingredients-list" class="ingredients-list" style="display:none"></div>
      <div id="ingredients-actions" class="modal-actions" style="display:none">
        <button class="modal-btn modal-cancel" id="ingredients-skip">閉じる</button>
        <button class="modal-btn modal-ok" id="ingredients-add">追加</button>
      </div>
      <div id="ingredients-recipes" class="ingredients-recipes" style="display:none"></div>
    </div>
  </div>

  <!-- 確認ダイアログ -->
  <div class="modal-overlay" id="confirm-overlay">
    <div class="modal">
      <div class="modal-title" id="confirm-title"></div>
      <div class="confirm-message" id="confirm-message"></div>
      <div class="modal-actions">
        <button class="modal-btn modal-cancel" id="confirm-cancel">キャンセル</button>
        <button class="modal-btn modal-danger" id="confirm-ok">削除</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=__CACHE_VERSION__"></script>
</body>
</html>
