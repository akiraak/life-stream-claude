<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1c1c1c">
  <meta name="description" content="お料理バスケット - 料理の買い物をスマートに管理する PWA アプリ">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://basket.chobi.me/">
  <meta property="og:title" content="お料理バスケット">
  <meta property="og:description" content="料理名を入れるだけで AI がレシピと食材を提案。買い物リストをスマートに管理できる PWA アプリ。">
  <meta property="og:image" content="https://basket.chobi.me/img/ogp.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="お料理バスケット">
  <meta name="twitter:description" content="料理名を入れるだけで AI がレシピと食材を提案。買い物リストをスマートに管理できる PWA アプリ。">
  <meta name="twitter:image" content="https://basket.chobi.me/img/ogp.png">
  <title>お料理バスケット</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="stylesheet" href="style.css?v=__CACHE_VERSION__">
  <!-- TODO: Google認証テスト後に復活 -->
  <!-- <script src="https://accounts.google.com/gsi/client" async defer></script> -->
</head>
<body>
  <!-- ログインページ -->
  <div id="login-page" style="display:none">
    <div class="login-container">
      <h1 class="login-title">お料理バスケット</h1>
      <div id="login-form">
        <p class="login-desc">メールアドレスを入力して<br>ログインコードを受け取ってください。</p>
        <input type="email" class="login-input" id="login-email" placeholder="メールアドレス" autocomplete="email">
        <button class="login-btn" id="login-submit">ログインコードを送信</button>
        <div class="login-error" id="login-error" style="display:none"></div>
        <!-- TODO: Google認証テスト後に復活
        <div class="login-divider"><span>または</span></div>
        <div id="google-signin-btn"></div>
        <div class="login-error" id="google-error" style="display:none"></div>
        -->
      </div>
      <div id="login-sent" style="display:none">
        <p class="login-sent-message" id="login-sent-message"></p>
        <div class="otp-section">
          <p class="otp-desc">メールに届いた6桁のコードを入力してください。</p>
          <input type="text" class="otp-input" id="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code">
          <button class="login-btn" id="otp-submit">ログイン</button>
          <div class="login-error" id="otp-error" style="display:none"></div>
        </div>
        <button class="login-retry-btn" id="login-retry">別のメールアドレスで試す</button>
      </div>
      <a href="/about" class="about-link">アプリについて・インストール方法</a>
    </div>
  </div>

  <!-- アプリコンテンツ -->
  <div id="app-content" style="display:none">
    <div class="container">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding:0 14px">
        <h1 style="margin:0">お料理バスケット</h1>
        <div class="header-right">
          <button class="header-icon-btn" id="header-shared-recipe-btn" title="みんなのレシピ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
          </button>
          <button class="header-icon-btn" id="header-saved-recipe-btn" title="自分のレシピ">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/></svg>
          </button>
          <button class="header-icon-btn" id="header-menu-btn" title="メニュー">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
        </div>
        <div class="header-menu" id="header-menu" style="display:none">
          <button class="header-menu-item" id="menu-shared-recipe">みんなのレシピ</button>
          <button class="header-menu-item" id="menu-saved-recipe">自分のレシピ</button>
          <div class="header-menu-email" id="header-menu-email"></div>
          <button class="header-menu-item" id="header-menu-logout">ログアウト</button>
        </div>
      </div>

      <div id="shopping-list"></div>

      <div id="empty-message" class="empty" style="display:none">
        リストは空です
      </div>
    </div>

    <!-- FAB -->
    <div class="fab-group">
      <button class="fab fab-dish" id="fab-dish" title="料理を追加">
        <img src="icon_dish.png" width="40" height="40" alt="料理を追加">
      </button>
      <button class="fab fab-item" id="fab-item" title="食材を追加">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <!-- モーダル -->
    <div class="modal-overlay" id="modal-overlay">
      <div class="modal" id="modal">
        <div class="modal-title" id="modal-title"></div>
        <div class="modal-input-row">
          <input type="text" class="modal-input" id="modal-input" placeholder="" autocomplete="off">
          <button class="btn-voice" id="btn-voice" title="音声入力" style="display:none">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
        </div>
        <div class="suggestions-dropdown" id="suggestions-dropdown"></div>
        <div class="modal-dish-row" id="modal-dish-row" style="display:none">
          <label class="modal-label">料理</label>
          <select class="modal-select" id="modal-dish-select">
            <option value="">未分類</option>
          </select>
        </div>
        <div class="modal-actions">
          <button class="modal-btn modal-cancel" id="modal-cancel">キャンセル</button>
          <button class="modal-btn modal-ok" id="modal-ok">追加</button>
        </div>
      </div>
    </div>

    <!-- 具材提案モーダル -->
    <div class="modal-overlay ingredients-overlay" id="ingredients-overlay">
      <div class="modal ingredients-modal">
        <div class="ingredients-header" id="ingredients-header" style="display:none">
          <button class="ingredients-header-btn" id="ingredients-skip">閉じる</button>
          <div class="modal-title ingredients-header-title" id="ingredients-title"></div>
          <input type="text" class="ingredients-title-input" id="ingredients-title-input" style="display:none" autocomplete="off">
          <span class="ingredients-header-btn"></span>
        </div>
        <div class="modal-title" id="ingredients-title-loading">具材を検索中...</div>
        <div id="ingredients-loading" class="ingredients-loading">
          <div class="spinner"></div>
        </div>
        <div id="ingredients-error" class="ingredients-error" style="display:none"></div>
        <div id="ingredients-list" class="ingredients-list" style="display:none"></div>
        <div id="extra-ingredients-section" class="extra-ingredients-section" style="display:none">
          <div class="extra-ingredients-label">追加素材（買い物リストから）</div>
          <div id="extra-ingredients-chips" class="extra-ingredients-chips"></div>
          <button id="extra-search-btn" class="extra-search-btn">この素材でレシピを再検索</button>
        </div>
        <div id="ingredients-recipes" class="ingredients-recipes" style="display:none"></div>
        <div id="ingredients-refresh-row" style="display:none">
          <button class="ingredients-refresh-btn" id="ingredients-refresh">レシピを再取得</button>
        </div>
      </div>
    </div>

    <!-- 料理レシピページ -->
    <div class="modal-overlay recipe-page-overlay" id="recipe-page-overlay">
      <div class="modal recipe-page-modal">
        <div class="recipe-page-header">
          <button class="ingredients-header-btn" id="recipe-page-close">閉じる</button>
          <div class="modal-title recipe-page-title" id="recipe-page-title">料理レシピ <span class="recipe-page-like-count" id="recipe-page-like-count"></span></div>
          <span class="ingredients-header-btn"></span>
        </div>
        <div class="recipe-search-bar">
          <input type="text" id="recipe-search-input" class="recipe-search-input" placeholder="レシピを検索..." autocomplete="off">
        </div>
        <div id="recipe-page-content"></div>
      </div>
    </div>

    <!-- 確認ダイアログ -->
    <div class="modal-overlay" id="confirm-overlay">
      <div class="modal">
        <div class="modal-title" id="confirm-title"></div>
        <div class="confirm-message" id="confirm-message"></div>
        <div class="modal-actions">
          <button class="modal-btn modal-cancel" id="confirm-cancel">キャンセル</button>
          <button class="modal-btn modal-danger" id="confirm-ok">削除</button>
        </div>
      </div>
    </div>

    <div id="toast" class="toast"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.6/Sortable.min.js"></script>
  <script src="app.js?v=__CACHE_VERSION__"></script>
</body>
</html>
