<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理画面 - 料理買物List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">管理画面</div>
      <nav class="sidebar-nav" id="sidebar-nav">
        <a href="#dashboard" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#9635;</span> ダッシュボード
        </a>
        <a href="#users" class="nav-item" data-page="users">
          <span class="nav-icon">&#9787;</span> ユーザー
        </a>
        <div class="nav-group-label">料理</div>
        <a href="#dishes" class="nav-item" data-page="dishes">
          <span class="nav-icon">&#9733;</span> 料理
        </a>
        <a href="#saved-recipes" class="nav-item" data-page="saved-recipes">
          <span class="nav-icon">&#128214;</span> 料理レシピ
        </a>
        <div class="nav-group-label">買い物</div>
        <a href="#shopping" class="nav-item" data-page="shopping">
          <span class="nav-icon">&#10003;</span> 買い物アイテム
        </a>
        <a href="#purchase-history" class="nav-item" data-page="purchase-history">
          <span class="nav-icon">&#8635;</span> 購入履歴
        </a>
        <div class="nav-group-label">システム</div>
        <a href="#system" class="nav-item" data-page="system">
          <span class="nav-icon">&#9881;</span> システム情報
        </a>
        <a href="#icon-preview" class="nav-item" data-page="icon-preview">
          <span class="nav-icon">&#127912;</span> アイコン候補
        </a>
        <a href="#app-name" class="nav-item" data-page="app-name">
          <span class="nav-icon">&#9998;</span> アプリ名候補
        </a>
        <a href="#monetization" class="nav-item" data-page="monetization">
          <span class="nav-icon">&#128176;</span> マネタイズ検討
        </a>
        <div class="nav-divider"></div>
        <a href="/" class="nav-item nav-back">
          <span class="nav-icon">&#8592;</span> アプリへ戻る
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="topbar">
        <h2 class="topbar-title" id="page-title">ダッシュボード</h2>
        <div class="topbar-user" id="topbar-user"></div>
      </header>
      <div class="content-area" id="content-area"></div>
    </main>
  </div>

  <div class="toast-container" id="toast-container"></div>
  <script src="app.js"></script>
</body>
</html>
